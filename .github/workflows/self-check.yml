# Miner self-check — runs on every PR, no maintainer/VPS needed.
# Gate preflight is the required check; the delta self-score is advisory (the
# tier is decided by Punch's private gate rerun, not here).
name: self-check
on: pull_request
jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: omakase-harness }
      - uses: actions/checkout@v4
        with: { repository: PunchTheDev/omakase-eval, path: omakase-eval }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - run: pip install -e omakase-eval
      - name: Gates 1-3 preflight (required)
        run: cd omakase-harness && python scripts/check_submission.py
      - name: Delta self-score vs main (advisory)
        run: cd omakase-harness && bash scripts/self_score.sh || echo "::warning::harness did not beat main on the public dev split"
